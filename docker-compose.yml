services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  rate-limiter:
    build: .
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - RATE_LIMIT_ALGORITHM=token_bucket
      - RATE_LIMIT_CAPACITY=10
      - RATE_LIMIT_RATE=6
    depends_on:
      - redis